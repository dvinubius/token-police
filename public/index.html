<!DOCTYPE html>
<html lang="en" data-theme="graphite">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Token Police - Agentic Surveillance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Saira+Condensed:wght@600;700;800&display=swap" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo" aria-hidden="true">
          <svg class="logo-badge" viewBox="0 0 32 36" focusable="false">
            <path class="logo-shell" d="M16 1.9c2.4 2 5.8 2.8 10.6 2.1-.3 3.5.8 6 3.4 8-2.5 2.7-2.8 8.9-4.7 13-1.7 3.8-5.1 6.6-9.3 8.9-4.2-2.3-7.6-5.1-9.3-8.9C4.8 20.9 4.5 14.7 2 12c2.6-2 3.7-4.5 3.4-8C10.2 4.7 13.6 3.9 16 1.9Z" />
            <path class="logo-inset" d="M16 5.4c2.1 1.5 4.8 2.2 8.3 1.9.1 2.5 1 4.4 2.6 5.9-1.8 2.8-2.1 7.5-3.6 10.5-1.4 2.7-4 5-7.3 6.9-3.3-1.9-5.9-4.2-7.3-6.9-1.5-3-1.8-7.7-3.6-10.5 1.6-1.5 2.5-3.4 2.6-5.9 3.5.3 6.2-.4 8.3-1.9Z" />
            <path class="logo-crest" d="M10.7 10.2c1.9.5 3.7.2 5.3-.8 1.6 1 3.4 1.3 5.3.8" />
            <text class="logo-glyph" x="16" y="20">$</text>
          </svg>
        </span>
        <div class="brand-copy">
          <h1>Token Police</h1>
          <span class="brand-tagline">AGENTIC SURVEILLANCE</span>
        </div>
      </div>
      <nav class="page-nav" aria-label="Primary">
        <button type="button" class="page-tab active" data-page-target="stats" aria-current="page">Stats</button>
        <button type="button" class="page-tab" data-page-target="sessions">Sessions</button>
      </nav>
      <div class="refresh" id="refreshIndicator" title="Auto-refreshes every 30s">
        <span class="dot"></span><span id="refreshText">live</span>
      </div>
    </header>

    <section class="page overview stats-page" id="statsPage" data-page="stats">
      <div class="global-stats" id="globalStats">
        <div class="gstat card"><span class="gstat-label">Estimated cost</span><span class="gstat-value estimated-cost" id="gsEstimatedCost">—</span></div>
        <div class="gstat card"><span class="gstat-label">Total tokens</span><span class="gstat-value tokens" id="gsTokens">—</span></div>
        <div class="gstat card"><span class="gstat-label">Sessions</span><span class="gstat-value" id="gsSessions">—</span></div>
        <div class="gstat card"><span class="gstat-label">LLM calls</span><span class="gstat-value" id="gsLlmCalls">—</span></div>
      </div>
      <div class="card chart-card">
        <div class="card-head">
          <h2>Daily token usage — last <span class="num">30</span> days</h2>
          <div class="legend">
            <span class="legend-item"><i class="swatch cc"></i>Claude Code</span>
            <span class="legend-item"><i class="swatch codex"></i>Codex</span>
          </div>
        </div>
        <div id="chart" class="chart"></div>
      </div>
      <div class="card top-card">
        <div class="card-head"><h2>Top <span class="num">5</span> expensive sessions</h2></div>
        <ol id="topList" class="top-list"></ol>
      </div>
    </section>

    <main class="page main sessions-page" id="sessionsPage" data-page="sessions" hidden>
      <section class="list-pane">
        <div class="filters">
          <input type="search" id="searchInput" placeholder="Search title or project…" />
          <select id="sourceFilter">
            <option value="">All sources</option>
            <option value="claude-code">Claude Code</option>
            <option value="codex">Codex</option>
          </select>
          <select id="projectFilter"><option value="">All projects</option></select>
          <label class="date-label">From <input type="date" id="fromDate" /></label>
          <label class="date-label">To <input type="date" id="toDate" /></label>
          <button id="clearFilters" class="ghost-btn">Clear</button>
        </div>
        <div class="list-meta" id="listMeta"></div>
        <div class="session-list" id="sessionList"></div>
      </section>

      <section class="detail-pane" id="detailPane">
        <div class="empty-detail" id="emptyDetail">
          <p>No session selected.</p>
        </div>
        <div class="detail-content" id="detailContent" hidden></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
