<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Token Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo">◆</span>
        <h1>Token Dashboard</h1>
      </div>
      <div class="global-stats" id="globalStats">
        <div class="gstat"><span class="gstat-label">Total spend</span><span class="gstat-value" id="gsCost">—</span></div>
        <div class="gstat"><span class="gstat-label">Total tokens</span><span class="gstat-value" id="gsTokens">—</span></div>
        <div class="gstat"><span class="gstat-label">Conversations</span><span class="gstat-value" id="gsConvos">—</span></div>
        <div class="gstat"><span class="gstat-label">LLM calls</span><span class="gstat-value" id="gsTurns">—</span></div>
      </div>
      <div class="refresh" id="refreshIndicator" title="Auto-refreshes every 30s">
        <span class="dot"></span><span id="refreshText">live</span>
      </div>
    </header>

    <section class="overview" id="overview">
      <div class="card chart-card">
        <div class="card-head">
          <h2>Daily token usage — last 30 days</h2>
          <div class="legend">
            <span class="legend-item"><i class="swatch cc"></i>Claude Code</span>
            <span class="legend-item"><i class="swatch codex"></i>Codex</span>
          </div>
        </div>
        <div id="chart" class="chart"></div>
      </div>
      <div class="card top-card">
        <div class="card-head"><h2>Top 5 most expensive</h2></div>
        <ol id="topList" class="top-list"></ol>
      </div>
    </section>

    <main class="main">
      <section class="list-pane">
        <div class="filters">
          <input type="search" id="searchInput" placeholder="Search title or project…" />
          <select id="sourceFilter">
            <option value="">All sources</option>
            <option value="claude-code">Claude Code</option>
            <option value="codex">Codex</option>
          </select>
          <select id="projectFilter"><option value="">All projects</option></select>
          <label class="date-label">From <input type="date" id="fromDate" /></label>
          <label class="date-label">To <input type="date" id="toDate" /></label>
          <button id="clearFilters" class="ghost-btn">Clear</button>
        </div>
        <div class="list-meta" id="listMeta"></div>
        <div class="conv-list" id="convList"></div>
      </section>

      <section class="detail-pane" id="detailPane">
        <div class="empty-detail" id="emptyDetail">
          <p>Select a conversation to see its human-request token breakdown.</p>
        </div>
        <div class="detail-content" id="detailContent" hidden></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
