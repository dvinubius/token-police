<!DOCTYPE html>
<html lang="en" data-theme="graphite">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Token Police - Agentic Surveillance</title>
    <script>
      // Anti-FOUC: apply the stored theme before first paint so the page never
      // flashes the default graphite theme for a light-theme user.
      (() => {
        try {
          const theme = localStorage.getItem('token-police-theme');
          if (theme === 'graphite' || theme === 'light') {
            document.documentElement.dataset.theme = theme;
          }
        } catch (_) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Saira+Condensed:wght@600;700;800&display=swap" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
